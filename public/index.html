<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎰 Расписной Покер Онлайн</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <!-- ===== СТАРТОВЫЙ ЭКРАН ===== -->
      <div id="menuScreen" class="screen active">
        <div class="menu-wrapper">
          <h1 class="title">🎰 РАСПИСНОЙ ПОКЕР</h1>
          <p class="subtitle">🏆 Кампания • 5 режимов • 36 карт • 6♠ = Джокер</p>

          <div class="menu-panel">
            <div class="input-group">
              <label for="playerName">👤 Ваше имя</label>
              <input type="text" id="playerName" placeholder="Введите имя" maxlength="20" />
            </div>

            <div class="button-group">
              <button class="btn btn-primary" onclick="game.createRoom()">
                🏠 Создать комнату
              </button>

              <div class="join-room">
                <input type="text" id="roomIdInput" placeholder="Код комнаты" maxlength="6" />
                <button class="btn btn-secondary" onclick="game.joinRoom()">🚪 Войти</button>
              </div>
            </div>

            <div id="connectionStatus" class="status"></div>
          </div>
        </div>
      </div>

      <!-- ===== ЭКРАН ОЖИДАНИЯ ===== -->
      <div id="waitingScreen" class="screen">
        <div class="waiting-wrapper">
          <h2 class="room-title">🏠 Комната: <span id="displayRoomId"></span></h2>

          <div class="players-list" id="roomSettings">
            <h3>🎮 Настройки комнаты</h3>
            <div>
              <h1>Режимы</h1>
              <div
                id="modeCheckboxes"
                class="mode-checkboxes"
              >
                <div style="opacity: 0.75;">Загрузка...</div>
              </div>
              <div id="modeHelp" class="mode-help"></div>
            </div>
          </div>

          <div class="players-list" id="playersList"></div>

          <button id="startBtn" class="btn btn-primary hidden" onclick="game.startGame()">
            🚀 Начать игру
          </button>

          <p class="waiting-text">⏳ Ожидание игроков...</p>
        </div>
      </div>

      <!-- ===== ИГРОВОЙ ЭКРАН ===== -->
      <div id="gameScreen" class="screen">
        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <main class="game-main">
          <!-- ИГРОВОЕ ПОЛЕ (СТОЛ + ИГРОКИ) -->
          <section class="table-section">
            <div class="table-wrapper">
              <!-- ИГРОКИ ВОКРУГ СТОЛА -->
              <div class="players-container" id="playersArea"></div>

              <!-- СТОЛ -->
              <div class="table-area">
                <div class="game-header">
                  <div class="header-blocks">
                    <div class="header-stats">
                      <div class="progress-bar" id="progressBar"></div>
                      <div class="mode-bar" id="modeBar"></div>
                      <div class="turn-bar" id="turnBar"></div>
                    </div>
                    <div class="info-bar" id="infoBar"></div>
                  </div>
                </div>
                <div class="cards-on-table" id="cardsOnTable"></div>
                <div class="control-content" id="controlArea"></div>
              </div>
            </div>
          </section>
        </main>
      </div>

      <!-- ===== ЭКРАН РЕЗУЛЬТАТОВ ===== -->
      <div id="resultsScreen" class="screen">
        <div class="results-wrapper">
          <h1 class="title">🏆 КАМПАНИЯ ЗАВЕРШЕНА</h1>

          <div class="leaderboard" id="leaderboard"></div>

          <button class="btn btn-primary" onclick="location.reload()">🔄 Новая игра</button>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
  </body>
</html>
